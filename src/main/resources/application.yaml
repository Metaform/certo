spring:
  application:
    name: certo
  # Persistence runs on Spring Data JPA. By default (dev/test) Spring Boot auto-configures an embedded
  # in-memory H2 database (a uniquely-named instance per application context, so tests are isolated); the
  # `prod` profile below swaps in Postgres. Concurrency control (unique constraints, @Version optimistic
  # locking) comes from the database, so it is correct across a cluster.
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

server:
  port: 8080

certo:
  # Seed a few sample certificates (with generated PDFs) at startup so the search/retrieval endpoints
  # return data on a fresh run. Off by default; the test suite enables it via the Gradle test task.
  seed-sample-data: false
  # Identity of the sample tenants created by ProviderCertificateSeeder (only when seed-sample-data=true).
  # Real tenants are created at runtime via POST /management/v1/participant-contexts and carry their own
  # bpn/source/did; these values are NOT used as a runtime identity default.
  provider:
    bpn: BPNL0000000001AB
    source: urn:bpn:BPNL0000000001AB
  consumer:
    bpn: BPNL0000000002CD
    source: urn:bpn:BPNL0000000002CD
  # Security tokens on the CCM protocol layer are always on and always come from a siglet STS: inbound calls
  # are verified via POST /tokens/verify and outbound calls resolve their token AND counterparty endpoint from
  # GET /tokens/{participantContextId}/{flowId}. A siglet is required (point at a mock siglet for dev/test).
  security:
    siglet-base-url: http://localhost:8090
  # Outbound OkHttp client, shared across all adapters (routed through RetryingHttpClient). Timeouts are in
  # seconds (0 disables a given timeout). Retry (Failsafe, like EDC's EdcHttpClient) retries a transient
  # IOException or 5xx with exponential backoff. Every outbound call is idempotent so retry is safe: reads;
  # the notification/acceptance messages correlated by exchangeId (CX-0135 §2.1.1); and the request-open,
  # which the provider resolves as find-or-create over a still-live exchange rather than opening a duplicate.
  # Backoff is in millis.
  http:
    connect-timeout-seconds: 10
    read-timeout-seconds: 30
    write-timeout-seconds: 30
    call-timeout-seconds: 60
    max-retries: 5
    min-backoff-millis: 500
    max-backoff-millis: 10000

logging:
  level:
    org.metaform.certo: INFO

---
# Production profile: Postgres instead of embedded H2. The schema is expected to already exist
# (managed out of band, e.g. Flyway) so Hibernate only validates it rather than generating DDL.
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${CERTO_DB_URL:jdbc:postgresql://localhost:5432/certo}
    username: ${CERTO_DB_USER:certo}
    password: ${CERTO_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
